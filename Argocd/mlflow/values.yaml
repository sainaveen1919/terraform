replicaCount: 1

image:
  repository: ghcr.io/mlflow/mlflow
  tag: v3.1.1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

route:
  enabled: true
  referenceGrantName: mlflow-reference-grant
  gatewayNamespace: envoy-gateway-system
  routeName: mlflow-route
  gatewayName: shared-gateway


postgres:
  host: postgres-postgresql.mlflow.svc.cluster.local
  port: 5432
  database: mlflow
  username: mlflow
  password: mlflow123

minio:
  endpoint: http://minio.minio.svc.cluster.local:9000
  bucket: mlflow
  accessKey: minioadmin
  secretKey: minioadmin123
  secretname: minio-secret

requests:
  cpu: 250m
  memory: 512Mi

  limits:
    cpu: 1000m
    memory: 1Gi

namespace:
  name: mlflow