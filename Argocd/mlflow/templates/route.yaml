
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ .Values.route.referenceGrantName }}
  namespace: {{ .Values.namespace.name }}
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: {{ .Values.route.gatewayNamespace | default "envoy-gateway-system" }}
  to:
  - group: ""
    kind: Service

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.route.routeName }}
  namespace: {{ .Values.namespace.name }}
spec:
  parentRefs:
  - name: {{ .Values.route.gatewayName }}
    namespace: {{ .Values.route.gatewayNamespace }}

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /mlflow

    backendRefs:
    - name: mlflow-server
      port: 5000
