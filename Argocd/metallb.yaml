apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: envoy-ip-pool
  namespace: metallb-system
  annotations:
    argo-cd.argoproj.io/sync-options: SkipDryRunOnServer=true
spec:
  addresses:
    - 192.168.1.0-192.168.1.30
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: envoy-l2-advertisement
  namespace: metallb-system
  annotations:
    argo-cd.argoproj.io/sync-options: SkipDryRunOnServer=true
spec:
  ipAddressPools:
    - envoy-ip-pool